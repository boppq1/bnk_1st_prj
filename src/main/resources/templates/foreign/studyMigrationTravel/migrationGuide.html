<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>BNK 부산은행 외환</title>
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/product/product.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/foreign/studyAbroad.css}">
</head>
<body>
<div th:replace="~{header :: header}"></div>
<div class="product-layout">

    <!-- 사이드바 -->
    <div th:replace="~{fragments/foreignSidebar :: foreignSidebar}"></div>

    <!-- 본문 -->
    <main class="product-main">

        <div class="service-container">

            <!-- 상단 제목 -->
            <h1 class="main-title">해외이주서비스안내</h1>

            <!-- 서비스 안내 -->
            <section class="service-section">

                <h2 class="section-title">
                   해외이주자를 위한 서비스안내
                </h2>

                <ul class="service-list">

                    <li>
                        <strong>환율우대</strong>

                        <p>
                            - 해외 이주 송금 및 환전시 환율을 50% 이상 우대해 드립니다.
                        </p>
                    </li>

                    <li>
                        <strong>해외송금수수료 감면</strong>
                        <p>
                            - 저희 은행을 거래 외국환은행으로 지정 후 송금시 송금수수료를 전액 면제하여 드립니다.
                        </p>
                </ul>
            </section>

        </div>

    </main>

</div>
<div th:replace="~{footer :: footer}"></div>
<script th:src="@{/js/product/foreign.js}"></script>
</body>
</html>
