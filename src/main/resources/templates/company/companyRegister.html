<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" th:href="@{/css/header.css}">
<link rel="stylesheet" th:href="@{/css/footer.css}">
<title>회원가입</title>
<link rel="stylesheet" type="text/css" th:href="@{/css/personal/personalRegisterPage.css}">
</head>
<body>
  <div th:replace="~{header :: header}"></div>

  <div class="register-page">
    <div class="register-card">
      <div class="register-card-header">
        <h2>회원가입</h2>
      </div>

      <div class="register-card-body">
        <form th:action="@{/companyrPro}" method="post">

          <!-- 계정 정보 -->
          <div class="sec-title">계정 정보</div>

          <div class="field">
            <label for="login_id">아이디</label>
            <div class="input-btn-row">
              <input type="text" name="login_id" id="login_id" placeholder="영문/숫자 4~10자" required>
              <button type="button" class="bnk-btn" id="checkId">중복 확인</button>
            </div>
            <p class="hint info" id="duplText"></p>
            <p class="hint info" id="checkIdText"></p>
          </div>

          <div class="field">
            <label for="password">비밀번호</label>
            <input type="password" name="password" id="password" placeholder="8자 이상, 특수문자 포함" required>
            <p class="hint info" id="passwordText"></p>
          </div>
          <!-- 사업자번호 -->          
		  <div class="divider"></div>
          <div class="sec-title">사업자</div>
          
          <div class="field">
            <label for="business_no">사업자 번호</label>
            <div class="input-btn-row">
              <input type="text" name="business_no" id="business_no" placeholder="000-00-0000" required>
              <button type="button" class="bnk-btn" id="check_business_no">사업자번호 조회</button>
            </div>
            <p class="hint info" id="business_no_text"></p>
          </div>
          
          <!-- 개인 정보 -->
          <div class="divider"></div>
          <div class="sec-title">개인 정보</div>

          <div class="two-col">
            <div class="field">
              <label>이름</label>
              <input type="text" name="name" placeholder="홍길동" required>
            </div>
            <div class="field">
              <label>영어 이름</label>
              <input type="text" name="e_name" placeholder="Hong Gildong" required>
            </div>
          </div>
		  
          <div class="two-col">
            <div class="field">
              <label>휴대폰 번호</label>
              <input type="tel" name="phone" placeholder="010-0000-0000" required>
            </div>
            <div class="field">
              <label>생년월일</label>
              <input type="date" name="birth" required>
            </div>
          </div>

          <div class="two-col">
            <div class="field">
              <label for="email">이메일</label>
              <input type="email" name="email" id="email" placeholder="example@email.com" required>
              <p class="hint info" id="emailText"></p>
            </div>
            <div class="field">
              <label>성별</label>
              <div class="radio-group">
                <label><input type="radio" name="gender" value="M" required> 남</label>
                <label><input type="radio" name="gender" value="F"> 여</label>
              </div>
            </div>
          </div>

          <!-- 계좌 -->
          <div class="divider"></div>
          <div class="sec-title">계좌</div>

          <div class="field" style="max-width:260px;">
            <label for="account_pw">계좌 비밀번호</label>
            <input type="text" name="account_pw" id="account_pw" placeholder="숫자 4~6자리" required>
            <p class="hint info" id="account_pw_text"></p>
          </div>
			
          <div class="submit-wrap">
            <button type="submit" class="submit-btn">가입하기</button>
            <p class="submit-notice">입력하신 정보는 안전하게 보호됩니다.</p>
          </div>

        </form>
      </div>
    </div>
  </div>


	
	<script>
		
		/* 아이디 형식 검사*/ 
		document.querySelector("#login_id").addEventListener('input', duplId); 

		function duplId() {
			
		    const regexr = /^[A-Za-z0-9]{4,10}$/;
		    
		    const id = document.querySelector("#login_id").value; 
		    const duplText = document.querySelector("#duplText");
		    
		    if (id === "") {
		        duplText.innerText = "";
		    } else if (!regexr.test(id)) { 
		        duplText.innerText = "아이디는 영문/숫자 4~10자여야 합니다.";
		        duplText.style.color = "red";
		    } else {
		        duplText.innerText = "올바른 아이디 형식입니다.";
		        duplText.style.color = "green";
		    }
		}
		
		/* 아이디 중복검사 */
		document.querySelector("#checkId").addEventListener('click', checkId);
		
		function checkId(e){
			
		    e.preventDefault();
		    
		const id = document.querySelector("#login_id").value;
		    fetch('/companyCheckId', {
		    	method: 'POST',
		    	headers: {
		    		'Content-Type': 'application/json'
		    	},
		    	body: JSON.stringify({
		    		'login_id': id
		    	})
		    })
		     	.then(res => res.json())
		     	.then(data => {
		     		const resultText = document.querySelector("#checkIdText");
		     		if(data.result == '사용가능한아이디'){
		     			resultText.innerText = '사용가능한 아이디 입니다.'
		     		}else{
		     			resultText.innerText = '사용할수 없는 아이디 입니다.'
		     			resultText.style.color = 'red';
		     		}
		     	});
		}
		
		/*  비밀번호 8자리이상 특수문자 포함 */
		document.querySelector("#password").addEventListener("input", checkPassword);
		
		function checkPassword(){
			const passwordValue = document.querySelector("#password").value;
			
			// 정규표현식 설명:
		    // ^ : 문자열의 시작
		    // (?=.*[!@#$%^&*]) : 특수문자가 최소 하나 이상 포함되어야 함
		    // .{8,} : 어떤 문자든 8자 이상이어야 함
		    // $ : 문자열의 끝
		    const passwordRegex = /^(?=.*[!@#$%^&*])[A-Za-z\d!@#$%^&*]{8,}$/;
		    
		    const passwordText = document.querySelector("#passwordText");
		    if(passwordValue == ''){
		    	passwordText.innerText = '비밀번호를 입력해주세요'
		    }
		    
		    else if(!passwordRegex.test(passwordValue)){
		    	passwordText.innerText = '비밀번호는 8자이상 특수문자를 포함해야합니다.'
		    	passwordText.style.color = 'red';
		    } else{
		    	passwordText.innerText = '안전한 비밀번호 입니다.'
		    	passwordText.style.color='green';
		    }
		    
		}
		
		/* 이메일 형식 정규식 표현 */
		document.querySelector("#email").addEventListener("input", checkEmail);
		function checkEmail(){
			const emailText = document.querySelector("#emailText");
			const emailValue = document.querySelector("#email").value;
			
			const regexr= /^[0-9a-zA-Z]([-_\.]?[0-9a-zA-Z])*@[0-9a-zA-Z]([-_\.]?[0-9a-zA-Z])*\.[a-zA-Z]{2,3}$/;
			
			if(emailValue == ''){
				emailText.innerText = "이메일을 입력해 주세요"
				emailText.style.color = "black"
			}else if(!regexr.test(emailValue)){
				emailText.innerText = "올바른 이메일 형식이 아닙니다."
				emailText.style.color="red";
			}else{
				emailText.innerText = "올바른 이메일 입니다";
				emailText.style.color="green";
			}
		}
		document.querySelector("#account_pw").addEventListener("blur", check_account_pw);
		
		function check_account_pw(){
			const account_pw_text = document.querySelector("#account_pw_text");
			const account_pw = document.querySelector("#account_pw").value;
			
			if(isNaN(account_pw) || account_pw == ''){
				account_pw_text.innerText = '숫자만 입력해주세요';
				return;
			}
			let isInvalid = false;
			for (let i = 0; i < account_pw.length - 2; i++) {
			    
			    if (account_pw[i] === account_pw[i + 1] && account_pw[i + 1] === account_pw[i + 2]) {
			        isInvalid = true; 
			        break;
			    }
			}
			
			if(isInvalid || account_pw.length != 4){
				account_pw_text.innerText = '사용할수 없는 비밀번호입니다.'
					account_pw_text.style.color='red';
			}else if(!isInvalid && account_pw.length == 4){
				account_pw_text.innerText = "사용가능한 비밀번호입니다."
				account_pw_text.style.color='green';
			}
		}
		/* 사업자 번호 조회 */
		document.querySelector("#check_business_no").addEventListener('click',check_bno);
		function check_bno(){
		const bno_text = document.querySelector("#business_no_text")
		const bno = document.querySelector("#business_no").value
			
			fetch('/selectBno',{
				method : 'post',
				headers: {
		    		'Content-Type': 'application/json'
		    	},
		    	body: JSON.stringify({
		    		'business_no': bno
		    	})
			})
			.then(res => res.json())
			.then(data => {
				if(data == 200){
					console.log("사용가능")
					bno_text.innerText = '인증되었습니다.'
					bno_text.style.color='green';
					
				} else{ 
					console.log("사용불가능")
					bno_text.innerText = '확인되지 않는 사업자번호 입니다.'
					bno_text.style.color='red';
				}
			})
		}
	</script>

  <div th:replace="~{footer :: footer}"></div>
</body>
</html>
