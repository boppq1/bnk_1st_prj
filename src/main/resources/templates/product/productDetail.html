<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.productName}">상품 상세</title>
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/product/product.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
</head>

<body>

<div th:replace="~{header :: header}"></div>

<div class="detail-page">

    <section class="detail-hero">

        <p class="detail-label" th:text="${product.productType}">상품 유형</p>

        <h1 th:text="${product.productName}">상품명</h1>

        <p th:text="${product.productDesc}">상품 설명</p>

    </section>

    <section class="detail-summary">

        <div class="summary-card">
            <h3>가입 대상</h3>
            <p th:switch="${product.targetCustomer}">
                <span th:case="'all'">전체</span>
                <span th:case="'personal'">개인</span>
                <span th:case="'company'">기업</span>
                <span th:case="*" th:text="${product.targetCustomer}">전체</span>
            </p>
        </div>

        <div class="summary-card">
            <h3>가입금액</h3>
            <p>
                <span th:text="${#numbers.formatInteger(product.minAmount, 3, 'COMMA')}">10,000</span>원 ~
            </p>
        </div>

        <div class="summary-card">
            <h3>가입기간</h3>
            <p>
                <span th:text="${product.minPeriodMonth}">1</span>
                ~
                <span th:text="${product.maxPeriodMonth}">36</span>개월
            </p>
        </div>

        <div class="summary-card">
            <h3>이자 지급 방식</h3>
            <p th:text="${product.interestPaymentType}">만기일시지급</p>
        </div>

    </section>

    <section class="detail-section">

        <h2>금리 안내</h2>

        <table class="product-table detail-table">
            <thead>
            <tr>
                <th>통화</th>
                <th>기간</th>
                <th>기본금리</th>
                <th>우대금리</th>
                <th>최고금리</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="rate : ${product.rates}">
                <td th:text="${rate.currencyCode}">KRW</td>
                <td>
                    <span th:text="${rate.periodMonth}">12</span>개월
                </td>
                <td>
                    <span th:text="${rate.baseRate}">3.5</span>%
                </td>
                <td>
                    <span th:text="${rate.preferentialRate}">0.5</span>%
                </td>
                <td>
                    <span th:text="${rate.maxRate}">4.0</span>%
                </td>
            </tr>
            </tbody>
        </table>

    </section>

    <section class="detail-section">

        <h2>우대금리 조건</h2>

        <div class="pref-grid">

            <div class="pref-card" th:each="pref : ${product.preferentialRates}">
                <h3 th:text="${pref.conditionType}">급여이체</h3>
                <p th:text="${pref.conditionDesc}">조건 설명</p>
                <strong>
                    +<span th:text="${pref.prefRate}">0.2</span>%
                </strong>
            </div>

        </div>

    </section>

    <section class="detail-section detail-text-section">

        <h2>상품 안내</h2>

        <div class="info-box">
            <h3>가입 방법</h3>
            <p th:text="${product.joinMethod}">가입방법</p>
        </div>

        <div class="info-box">
            <h3>유의사항</h3>
            <p th:text="${product.precautions}">유의사항</p>
        </div>

        <div class="info-box">
            <h3>예금자 보호</h3>
            <p th:text="${product.depositorProtection}">예금자 보호</p>
        </div>

    </section>

</div>

<div th:replace="~{footer :: footer}"></div>

</body>
</html>
