<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" th:href="@{/css/header.css}">
<link rel="stylesheet" th:href="@{/css/footer.css}">

<title>PersonalmyPage</title>1
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --red: #C8001E;
      --red-light: #f5e6e9;
      --gray-50: #f9f9f9;
      --gray-100: #f2f2f2;
      --gray-200: #e4e4e4;
      --gray-400: #aaaaaa;
      --gray-600: #666666;
      --gray-800: #222222;
      --white: #ffffff;
      --radius: 4px;
      --shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
 
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--gray-100);
      color: var(--gray-800);
      min-height: 100vh;
    }
 
    /* ── BODY WRAPPER ── */
    .mypage-body {
      display: flex;
      gap: 20px;
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px;
      align-items: flex-start;
    }
 
    /* ══════════════════════════════
       LEFT: 프로필 카드
    ══════════════════════════════ */
    .profile-card {
      flex: 0 0 220px;
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 28px 20px 20px;
    }
 
    .profile-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--gray-200);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
    }
 
    .profile-avatar svg {
      width: 36px;
      height: 36px;
      fill: var(--gray-400);
    }
 
    .profile-name {
      text-align: center;
      margin-bottom: 4px;
    }
 
    .profile-name .name {
      font-size: 16px;
      font-weight: 700;
      color: var(--gray-800);
    }
 
    .profile-name .name .suffix {
      font-size: 12px;
      font-weight: 400;
      color: var(--gray-600);
      margin-left: 2px;
    }
 
    .profile-grade {
      text-align: center;
      font-size: 11px;
      color: var(--gray-600);
      margin-bottom: 20px;
    }
 
    .profile-divider {
      border: none;
      border-top: 1px solid var(--gray-200);
      margin-bottom: 16px;
    }
 
    .profile-info-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }
 
    .profile-info-list li {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--gray-600);
    }
 
    .profile-info-list li svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      stroke: var(--gray-400);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
 
    .profile-links {
      display: flex;
      flex-direction: column;
      gap: 2px;
      border-top: 1px solid var(--gray-200);
      padding-top: 14px;
    }
 
    .profile-links a {
      font-size: 12px;
      color: var(--gray-600);
      text-decoration: none;
      padding: 4px 0;
      display: flex;
      align-items: center;
      gap: 4px;
    }
 
    .profile-links a::after {
      content: '›';
      font-size: 14px;
      color: var(--gray-400);
    }
 
    .profile-links a:hover { color: var(--red); }
 
    /* ══════════════════════════════
       RIGHT: 뱅킹 정보 + 계좌 정보
    ══════════════════════════════ */
    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
 
    .panel {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      overflow: hidden;
    }
 
    /* Panel 헤더 */
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--gray-200);
      position: relative;
    }
 
    .panel-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--gray-800);
    }
 
    .panel-header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }
 
    .logout-btn {
      background: var(--red);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      padding: 6px 12px;
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
    }
 
    .header-link {
      font-size: 12px;
      color: var(--gray-600);
      text-decoration: none;
    }
 
    .header-link:hover { color: var(--red); }
 
    /* ── 뱅킹정보 테이블 ── */
    .banking-table {
      width: 100%;
      border-collapse: collapse;
    }
 
    .banking-table th,
    .banking-table td {
      padding: 12px 20px;
      font-size: 13px;
      text-align: center;
      border-bottom: 1px solid var(--gray-100);
    }
 
    .banking-table thead th {
      color: var(--gray-600);
      font-weight: 500;
      background: var(--gray-50);
      font-size: 12px;
    }
 
    .banking-table tbody td {
      color: var(--gray-800);
    }
 
    .banking-table tbody tr:last-child td {
      border-bottom: none;
    }
 
    /* ── 나의계좌정보 탭 ── */
    .account-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--gray-200);
    }
 
    .account-title {
      font-size: 15px;
      font-weight: 700;
    }
 
    .account-setting-link {
      font-size: 12px;
      color: var(--gray-600);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 2px;
    }
 
    .account-setting-link::after {
      content: '›';
      font-size: 14px;
      color: var(--gray-400);
    }
 
    .account-setting-link:hover { color: var(--red); }
 
    .tab-bar {
      display: flex;
      gap: 0;
      padding: 14px 20px 0;
      border-bottom: 1px solid var(--gray-200);
    }
 
    .tab-btn {
      padding: 8px 14px;
      font-size: 13px;
      font-family: inherit;
      border: none;
      background: none;
      color: var(--gray-600);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      border-radius: 0;
      transition: color 0.15s;
    }
 
    .tab-btn.active {
      font-weight: 700;
      color: var(--white);
      background: var(--gray-800);
      border-radius: 4px 4px 0 0;
      border-bottom: 2px solid var(--gray-800);
    }
 
    .tab-btn:not(.active):hover { color: var(--red); }
 
    /* ── 계좌 목록 ── */
    .account-list {
      list-style: none;
    }
 
    .account-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--gray-100);
    }
 
    .account-item:last-child { border-bottom: none; }
 
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 7px;
      border-radius: 2px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }
 
    .badge-limit {
      background: var(--red);
      color: var(--white);
      border: 1px solid var(--red);
    }
 
    .account-name {
      flex: 1;
      font-size: 13px;
      color: var(--gray-800);
    }
 
    .account-number {
      font-size: 13px;
      color: var(--gray-600);
      margin-left: auto;
    }
 
    .account-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
 
    .act-btn {
      padding: 5px 12px;
      font-size: 12px;
      font-family: inherit;
      border: 1px solid var(--gray-200);
      background: var(--white);
      color: var(--gray-800);
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.12s;
    }
 
    .act-btn:hover { background: var(--gray-100); }
  </style>
</head>
<body>
 
<div class="mypage-body">
 
  <!-- ══ 왼쪽: 프로필 카드 ══ -->
  <div class="profile-card">
    <div class="profile-avatar">
      <!-- 사람 아이콘 -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
      </svg>
    </div>
 
    <div class="profile-name">
      <span class="name">김건업<span class="suffix">고객님</span></span>
    </div>
    <div class="profile-grade">일반등급</div>
 
    <hr class="profile-divider" />
 
    <ul class="profile-info-list">
      <li>
        <!-- user icon -->
        <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        A0840776
      </li>
      <li>
        <!-- mail icon -->
        <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><polyline points="3 5 12 13 21 5"/></svg>
        **nyub1120@naver.com
      </li>
      <li>
        <!-- phone icon -->
        <svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><circle cx="12" cy="18" r="1" fill="currentColor" stroke="none"/></svg>
        010-6414-****
      </li>
    </ul>
 
    <div class="profile-links">
      <a href="#">사용자정보변경</a>
      <a href="#">카드회원정보변경</a>
      <a href="#">스마트알림센터</a>
    </div>
  </div>
 
  <!-- ══ 오른쪽: 메인 콘텐츠 ══ -->
  <div class="content-area">
 
    <!-- 뱅킹정보 패널 -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">뱅킹정보</span>
        <div class="panel-header-actions">
          <button class="logout-btn">로그아웃을 생활화 합시다.</button>
          <a href="#" class="header-link">공동인증센터</a>
          <a href="#" class="header-link">접속정보</a>
        </div>
      </div>
      <table class="banking-table">
        <thead>
          <tr>
            <th>접속방식</th>
            <th>보안매체</th>
            <th>최종접속시간</th>
            <th>인증서만료</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>간편인증</td>
            <td>없음</td>
            <td>2026-05-06 16:34:18</td>
            <td>2029-05-06</td>
          </tr>
        </tbody>
      </table>
    </div>
 
    <!-- 나의계좌정보 패널 -->
    <div class="panel">
      <div class="account-header">
        <span class="account-title">나의계좌정보</span>
        <a href="#" class="account-setting-link">출금계좌설정</a>
      </div>
 
      <!-- 탭 -->
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab(this)">출금계좌</button>
        <button class="tab-btn" onclick="switchTab(this)">오픈뱅킹</button>
        <button class="tab-btn" onclick="switchTab(this)">예금/신탁</button>
        <button class="tab-btn" onclick="switchTab(this)">펀드</button>
        <button class="tab-btn" onclick="switchTab(this)">대출</button>
        <button class="tab-btn" onclick="switchTab(this)">외화</button>
        <button class="tab-btn" onclick="switchTab(this)">보험</button>
      </div>
 
      <!-- 계좌 목록 -->
      <ul class="account-list">
        <li class="account-item">
          <span class="badge badge-limit">한도제한</span>
          <span class="account-name">자유저축예금(마이통장)</span>
          <span class="account-number">112-2363-8464-06</span>
          <div class="account-actions">
            <button class="act-btn">조회</button>
            <button class="act-btn">이체</button>
          </div>
        </li>
      </ul>
    </div>
 
  </div><!-- /.content-area -->
</div><!-- /.mypage-body -->
 
<script>
  function switchTab(el) {
    el.closest('.tab-bar').querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
  }
</script>
</body>
</html>
