
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" th:href="@{/css/header.css}">
<link rel="stylesheet" th:href="@{/css/footer.css}">

<title>PersonalmyPage</title>
<link
	href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap"
	rel="stylesheet" />
<link rel="stylesheet" th:href="@{/css/personal/myPage.css}">
</head>
<body>
	<div th:replace="~{header :: header}"></div>
	<div class="mypage-body">

		<!-- ══ 왼쪽: 프로필 카드 ══ -->
		<div class="profile-card">
			<div class="profile-avatar">
				<!-- 사람 아이콘 -->
				<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path
						d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z" />
      </svg>
			</div>

			<div class="profile-name">
				<span class="name" id="usr_nm" th:text="|*{userInfo.usr_nm} 고객님|"><span
					class="suffix">고객님</span></span>
			</div>
			<div class="profile-grade">일반등급</div>

			<hr class="profile-divider" />

			<ul class="profile-info-list">
				<li>
					<!-- user icon --> <svg viewBox="0 0 24 24">
						<circle cx="12" cy="8" r="4" />
						<path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" /></svg>
					<p id="login_id" th:text="*{userInfo.login_id}"></p>
				</li>
				<li>
					<!-- mail icon --> <svg viewBox="0 0 24 24">
						<rect x="3" y="5" width="18" height="14" rx="2" />
						<polyline points="3 5 12 13 21 5" /></svg>
					<p id="email" th:text="*{userInfo.email}"></p>
				</li>
				<li>
					<!-- phone icon --> <svg viewBox="0 0 24 24">
						<rect x="5" y="2" width="14" height="20" rx="2" />
						<circle cx="12" cy="18" r="1" fill="currentColor" stroke="none" /></svg>
					<p id="tel_no" th:text="*{userInfo.tel_no}"></p>
				</li>
			</ul>

			<div class="profile-links">
				<a href="/personal/changeUserInfo">사용자정보변경</a> <a href="#">카드회원정보변경</a> <a href="#">스마트알림센터</a>
			</div>
		</div>

		<!-- ══ 오른쪽: 메인 콘텐츠 ══ -->
		<div class="content-area">

			<!-- 뱅킹정보 패널 -->
			<div class="panel">
				<div class="panel-header">
					<span class="panel-title">뱅킹정보</span>

				</div>
				<table class="banking-table">
					<thead>
						<tr>
							<th>접속방식</th>
							<th>최종접속시간</th>
						</tr>
					</thead>
					<tbody>
						<tr>
							<td>웹사이트</td>
							<td id="last_lgn_dt" th:text="*{userInfo.last_lgn_dt}"></td>
						</tr>
					</tbody>
				</table>
			</div>

			<!-- 나의계좌정보 패널 -->
			<div class="panel">
				<div class="account-header">
					<span class="account-title">나의계좌정보</span> <a href="#"
						class="account-setting-link">출금계좌설정</a>
				</div>

				<!-- HTML 탭 버튼 -->
				<div class="tab-bar">
					<button class="tab-btn active" onclick="switchTab('all')">전체</button>
					<button class="tab-btn" onclick="switchTab('deposit')">예금</button>
					<button class="tab-btn" onclick="switchTab('foreign')">외화</button>
				</div>

				<!-- 계좌 목록 -->
				<ul class="account-list">

					<!-- 예금 계좌 -->
					<th:block th:each="acnt : ${userAcnt}">
						<li class="account-item deposit-item">
							<div class="account-top">
								<span class="badge badge-deposit">예금</span> <span
									class="account-name" th:text="${acnt.bank_nm}"></span>
							</div> <span id="openAcnt" class="account-number" th:text="|계좌번호 ${acnt.acnt_num}|"></span>
						</li>
					</th:block>

					<!-- 외화 계좌 -->
					<th:block th:each="facnt : ${userFAcnt}">
						<li class="account-item foreign-item">
							<div class="account-top">
								<span class="badge badge-foreign">외화</span> <span
									class="account-name" th:text="${facnt.bank_nm}"></span>
							</div> <button id="openFAcnt" class="account-number" th:text="|계좌번호 ${facnt.acnt_num}|"></button>
						</li>
					</th:block>

				</ul>
			</div>

		</div>
		<!-- /.content-area -->
	</div>
	<!-- /.mypage-body -->


	
	<button id="openBtn">상세보기 (모달 열기)</button>

	<!-- 2. 겹쳐서 나올 모달 화면 정의 -->
	<dialog id="myModal">
	<h3>안녕하세요! 모달 창입니다.</h3>
	<p>기존 창 위에 겹쳐서 나타난 화면입니다. ESC 키를 누르면 자동으로 닫힙니다.</p>

	<!-- 3. 모달을 닫아줄 버튼 -->
	<button id="closeBtn">닫기</button>
	</dialog>
	

	<div th:replace="~{footer :: footer}"></div>
	 <script th:src="@{/js/zoom.js}"></script>
	<script>
  function switchTab(type) {
    // 클릭된 버튼을 event.target으로 가져옴
    const clickedBtn = event.target;

    // 모든 탭 버튼에서 active 제거
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    
    // 클릭된 버튼에 active 추가
    clickedBtn.classList.add('active');

    // 예금 계좌 보이기/숨기기
    document.querySelectorAll('.deposit-item').forEach(function(item) {
      if (type === 'all' || type === 'deposit') {
        item.style.display = '';
      } else {
        item.style.display = 'none';
      }
    });

    // 외화 계좌 보이기/숨기기
    document.querySelectorAll('.foreign-item').forEach(function(item) {
      if (type === 'all' || type === 'foreign') {
        item.style.display = '';
      } else {
        item.style.display = 'none';
      }
    });
  }


        // 엘리먼트 가져오기
        const modal = document.getElementById('myModal');
        const openAcnt = document.getElementById('openAcnt');
        const openFAcnt = document.getElementById('openFAcnt');
        const closeBtn = document.getElementById('closeBtn');

        // [열기] 버튼 클릭 시 기존 창 위에 겹쳐서 노출
        openBtn.addEventListener('click', () => {
            modal.showModal(); // 💡 .show()가 아닌 .showModal()을 써야 배경 차단막이 생깁니다.
        });

        // [닫기] 버튼 클릭 시 모달 닫기
        closeBtn.addEventListener('click', () => {
            modal.close();
        });
    </script>
</body>
</html>
