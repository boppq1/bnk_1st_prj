<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">

<link rel="stylesheet" th:href="@{/css/header.css}">
<link rel="stylesheet" th:href="@{/css/footer.css}">
<link rel="stylesheet" th:href="@{/css/body.css}">
<link rel="stylesheet" th:href="@{/css/search/search.css}">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" th:href='@{/css/personal/changeUserInfo.css}'>
<title>개인 비밀번호 변경</title>

</head>
<body>
   <div th:replace="~{header :: header}"></div>
    <div class="page-wrap">
        <div class="section">
            <div class="section-title">비밀번호 변경</div>
            <table class="pw-table">
                <tr>
                    <td class="lbl">기존 비밀번호</td>
                    <td class="input-cell">
                        <input type="password" id="now_pw" placeholder="현재 비밀번호 입력">
                        <p class="hint" id="now_pwText"></p>
                    </td>
                </tr>
                <tr>
                    <td class="lbl">새 비밀번호</td>
                    <td class="input-cell">
                        <input type="password" id="new_pw" placeholder="8자 이상, 특수문자 포함">
                        <p class="hint" id="new_pwText"></p>
                    </td>
                </tr>
                <tr>
                    <td class="lbl">비밀번호 확인</td>
                    <td class="input-cell">
                        <input type="password" id="check_pw" placeholder="새 비밀번호 재입력">
                        <p class="hint" id="check_pwText"></p>
                    </td>
                </tr>
                <tr>
                    <td colspan="2" class="btn-row">
                        <button class="submit-btn" type="button" id="changeBtn">변경</button>
                    </td>
                </tr>
            </table>
        </div>
    </div>
    <div th:replace="~{footer :: footer}"></div>

	<script>
		/*  비밀번호 8자리이상 특수문자 포함 */

		document.querySelector("#new_pw").addEventListener("input", newPassword);
		function newPassword() {
			const passwordValue = document.querySelector("#new_pw").value;
			const now_pw = document.querySelector("#now_pw").value;

			// 정규표현식 설명:
			// ^ : 문자열의 시작
			// (?=.*[!@#$%^&*]) : 특수문자가 최소 하나 이상 포함되어야 함
			// .{8,} : 어떤 문자든 8자 이상이어야 함
			// $ : 문자열의 끝
			const passwordRegex = /^(?=.*[!@#$%^&*])[A-Za-z\d!@#$%^&*]{8,}$/;

			const passwordText = document.querySelector("#new_pwText");
			if (passwordValue == '') {
				passwordText.innerText = '비밀번호를 입력해주세요'
			}

			else if (!passwordRegex.test(passwordValue)) {
				passwordText.innerText = '비밀번호는 8자이상 특수문자를 포함해야합니다.'
				passwordText.style.color = 'red';
			} else if (now_pw === passwordValue) {
				passwordText.innerText = '같은 비밀번호는 변경 불가능 합니다.'
				passwordText.style.color = 'orange';
			} else {
				passwordText.innerText = '안전한 비밀번호 입니다.'
				passwordText.style.color = 'green';
			}
		}
		document.querySelector("#check_pw").addEventListener("blur",
				checkPassword);
		function checkPassword() {
			const new_pw = document.querySelector("#new_pw").value;
			const checkPw = document.querySelector("#check_pw").value;
			const check_pwText = document.querySelector("#check_pwText");
			if (new_pw === checkPw) {
				check_pwText.innerText = '비밀번호가 일치합니다'
				check_pwText.style.color = "green";
			} else {
				check_pwText.innerText = '비밀번호가 일치 하지 않습니다.'
				check_pwText.style.color = "red";
			}
		}
		
		document.querySelector("#changeBtn").addEventListener('click', btn);
		function btn(){
			const new_pw = document.querySelector("#new_pw").value;
			const now_pw = document.querySelector("#now_pw").value;
			
			fetch('/changePwProc',{
				method : 'post',
				headers : {
					'Content-Type' : 'application/json'
				},
				body : JSON.stringify({
					'new_pw' : new_pw,
					'now_pw' : now_pw
				})
			})
			.then(response => response.text())
			.then(data => {
				if (data === "ok") {
		            alert("비밀번호 변경이 가능합니다. (또는 변경 성공)");
		            // 여기에 다음 페이지 이동이나 성공 후 로직을 넣으세요.
		            // location.href = "/main"; 
		        } 
		        // fail 일 때의 처리
		        else if (data === "fail") {
		            alert("기존 비밀번호와 새 비밀번호가 같아 변경할 수 없습니다.");
		        }
		    })
		    .catch(error => {
		        console.error("네트워크 에러 발생:", error);
		    });

		}
	</script>
</body>
</html>
