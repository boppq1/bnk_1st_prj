<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>BNK Busan Bank - 결재 승인 관리</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" th:href="@{/css/admin/approvalPage.css}">

</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">
            <img src="https://sites.bnk.co.kr/main/resource/img/common/logo_busan.png" alt="BNK 부산은행">
        </div>
        <ul class="sidebar-menu">
            <li><a href="#" class="menu-item"><i class="fa-solid fa-chart-line"></i> 대시보드</a></li>
            <li><a href="#" class="menu-item"><i class="fa-solid fa-users-gear"></i> 관리자 관리</a></li>
            <li><a href="#" class="menu-item active"><i class="fa-solid fa-file-signature"></i> 결제 승인 관리</a></li>
            <li><a href="#" class="menu-item"><i class="fa-solid fa-coins"></i> 외환 상품 관리</a></li>
        </ul>
    </div>

    <div class="header">
        <div class="header-title">관리자 승인 센터</div>
    </div>

    <div class="main-content">
        <div class="content-header">
            <h1 class="content-title"><i class="fa-solid fa-clipboard-check" style="color: var(--primary-color);"></i> 결재 신청 목록</h1>
            <p style="color: var(--text-label); font-size: 14px; margin-top: 8px;">하위 관리자가 신청한 상품 등록 및 수정 건에 대한 결재 리스트입니다.</p>
        </div>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>요청 번호</th>
                        <th>대상 상품 ID</th>
                        <th>신청 관리자</th>
                        <th>신청 상태</th>
                        <th>신청 구분</th>
                        <th style="text-align: center;">액션</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="approval : ${approvalList}">
                        <td th:text="${approval.request_id}" style="font-weight: 700;"></td>
                        <td>
                            <span th:if="${approval.product_id != null}" th:text="'#' + ${approval.product_id}" style="color: var(--primary-color); font-weight: 600;"></span>
                            <span th:if="${approval.product_id == null}" style="color: #ADB5BD;">(신규 등록)</span>
                        </td>
                        <td th:text="${approval.requester_id}"></td>
                        <td>
                            <span th:if="${approval.request_status == 'PENDING'}" class="badge badge-pending">대기 중</span>
                            <span th:if="${approval.request_status == 'APPROVED'}" class="badge badge-approved">승인 완료</span>
                            <span th:if="${approval.request_status == 'REJECTED'}" class="badge badge-rejected">반려됨</span>
                        </td>
                        <td>
                            <span class="type-tag" th:text="${approval.request_type}"></span>
                        </td>
                        <td style="text-align: center;">
                            <a class="btn-detail" th:href="@{/admin/approvalDetailPage(product_id=${approval.product_id})}">
                                <i class="fa-solid fa-magnifying-glass"></i> 상세검토
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
