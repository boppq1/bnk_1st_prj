<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<h1>관리자 리스트 페이지</h1>
	<hr>
	<table border=1>
		<thead>
			<tr>
				<td>번호</td>
				<td>아이디</td>
				<td>비밀번호</td>
				<td>부서</td>
				<td>관리자 비밀번호</td>
				<td>이름</td>
				<td>직위</td>
			</tr>
		</thead>
		
		<tbody>
			<tr th:each="admin : ${adminList}">
				<td th:text="${admin.admin_id}"></td>
				<td th:text="${admin.login_id}"></td>
				<td th:text="${admin.password}"></td>
				<td th:text="${admin.department}"></td>
				<td th:text="${admin.admin_pw}"></td>
				<td th:text="${admin.name}"></td>
				<td th:text="${admin.admin_role}"></td>
			</tr>
		</tbody>
	</table>
</body>
</html>
