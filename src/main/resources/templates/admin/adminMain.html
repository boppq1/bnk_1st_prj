<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>BNK Busan Bank - 관리자 포털</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
	<link rel="stylesheet" th:href="@{/css/admin/adminMain.css}">

</head>
<body>

<!-- 상단 바 -->
<div class="top-bar">
	<img src="/images/BNKlogo.png" alt="BNK 부산은행 로고">
	<div class="top-bar-right">관리자 전용 포털 &nbsp;|&nbsp; IT Strategy Team</div>
</div>

<!-- 메인 콘텐츠 -->
<div class="main-wrapper">
	<div class="center-box">

		<!-- 환영 문구 -->
		<div class="welcome-section">
			<div class="welcome-badge">
				<i class="fa-solid fa-shield-halved"></i>
				Admin Portal
			</div>
			<h1 class="welcome-title">BNK 부산은행<br><span>관리자 시스템</span>에 오신 걸 환영합니다</h1>
			<p class="welcome-desc">
				로그인 후 대시보드, 상품 관리, 회원 관리 등<br>다양한 관리 기능을 이용하실 수 있습니다.
			</p>
		</div>

		<!-- 로그인 / 회원가입 카드 -->
		<div class="card-row">

			<!-- 로그인 카드 -->
			<div class="action-card">
				<div class="card-icon-wrap red">
					<i class="fa-solid fa-right-to-bracket"></i>
				</div>
				<div class="card-title">로그인</div>
				<div class="card-desc">
					관리자 계정으로 로그인하여<br>시스템을 이용하세요.
				</div>
				<a href="/adminLogin" class="card-btn primary">로그인하기</a>
			</div>

			<!-- 회원가입 카드 -->
			<div class="action-card">
				<div class="card-icon-wrap gray">
					<i class="fa-solid fa-user-plus"></i>
				</div>
				<div class="card-title">회원가입</div>
				<div class="card-desc">
					신규 관리자 계정을<br>등록하실 수 있습니다.
				</div>
				<a href="/adminJoin" class="card-btn outline">회원가입하기</a>
			</div>

		</div>

	</div>
</div>

<!-- 하단 푸터 -->
<div class="footer">
	&copy; 2024 BNK Busan Bank. All rights reserved. &nbsp;|&nbsp; IT Strategy Team
</div>

</body>
</html>
