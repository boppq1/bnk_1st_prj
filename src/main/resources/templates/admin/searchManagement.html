<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<h1>검색어 관리</h1>
	<hr>
	<h2>검색어 벤</h2>
	<form th:action="@{/admin/keywordBan}" method="get">
		<input type="text" name="keyword">
		<input type="submit" value="벤">
	</form>
	<hr>
	<h2>추천 검색어 테이블 업데이트</h2>
	<form th:action="@{/admin/updateSuggestKeyword}" method="get">
		<input type="submit" value="업데이트">
	</form>	
	<hr>
	<h2>개인 추천 검색어 추가</h2>
	<form th:action="@{/admin/setSuggestPersonalKeyword}" method="get">
		<input type="text" name="keyword">
		<input type="submit" value="업데이트">
	</form>
	
	<h2>기업 추천 검색어 추가</h2>
	<form th:action="@{/admin/setSuggestCompanyKeyword}" method="get">
		<input type="text" name="keyword">
		<input type="submit" value="업데이트">
	</form>		
	
	<hr>
	
	<h2>개인 검색어</h2>
	<table>
		<thead>
			<tr>
				<th>번호</th>
				<th>검색한 시간</th>
				<th>검색한 사람 ID</th>
				<th>타입</th>
				<th>검색어</th>
				<th>검색 횟수</th>
			</tr>
		</thead>
		
		<tbody>
			<tr th:each = "searchh : ${search_per}">
				<td th:text="${searchh.search_no}"></td>
				<td th:text="${searchh.search_time}"></td>
				<td th:text="${searchh.searcher}"></td>
				<td th:text="${searchh.role_type}"></td>
				<td th:text="${searchh.keyword}"></td>
				<td th:text="${searchh.search_volume}"></td>
			</tr>
		</tbody>
	</table>
	<h2>개인 추천 검색어</h2>
	<table>
		<thead>
			<tr>
				<th>번호</th>
				<th>타입</th>
				<th>검색어</th>
				<th>검색 횟수</th>
			</tr>
		</thead>
		
		<tbody>
			<tr th:each = "suggestt : ${suggest_per}">
				<td th:text="${suggestt.suggested_no}"></td>
				<td th:text="${suggestt.role_type}"></td>
				<td th:text="${suggestt.keyword}"></td>
				<td th:text="${suggestt.search_volume}"></td>
			</tr>
		</tbody>
	</table>
	<hr>
	<br>
	<h2>기업 검색어</h2>
	<table>
		<thead>
			<tr>
				<th>번호</th>
				<th>검색한 시간</th>
				<th>검색한 사람 ID</th>
				<th>타입</th>
				<th>검색어</th>
				<th>검색 횟수</th>
			</tr>
		</thead>
		
		<tbody>
			<tr th:each = "searchh : ${search_com}">
				<td th:text="${searchh.search_no}"></td>
				<td th:text="${searchh.search_time}"></td>
				<td th:text="${searchh.searcher}"></td>
				<td th:text="${searchh.role_type}"></td>
				<td th:text="${searchh.keyword}"></td>
				<td th:text="${searchh.search_volume}"></td>
			</tr>
		</tbody>
	</table>
	<h2>기업 추천 검색어</h2>
	<table>
		<thead>
			<tr>
				<th>번호</th>
				<th>타입</th>
				<th>검색어</th>
				<th>검색 횟수</th>
			</tr>
		</thead>
		
		<tbody>
			<tr th:each = "suggestt : ${suggest_com}">
				<td th:text="${suggestt.suggested_no}"></td>
				<td th:text="${suggestt.role_type}"></td>
				<td th:text="${suggestt.keyword}"></td>
				<td th:text="${suggestt.search_volume}"></td>
			</tr>
		</tbody>
	</table>
	<table>
		<thead>
			<tr>
				<th>번호</th>
				<th>벤 키워드</th>
				<th>벤 날짜</th>
				<th>벤 한 관리자 번호</th>
				<th>삭제</th>
			</tr>
		</thead>
		
		<tbody>
			<tr th:each = "bann : ${ban}">
				<td th:text="${bann.key_no}"></td>
				<td th:text="${bann.keyword}"></td>
				<td th:text="${bann.ban_dt}"></td>
				<td th:text="${bann.adm_no}"></td>
				<td><a th:href="@{/admin/deleteBanKeyword(keyword=${bann.keyword})}">삭제</a></td>
			</tr>
		</tbody>
	</table>
</body>
</html>
