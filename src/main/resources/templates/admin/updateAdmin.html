<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>BNK Busan Bank - 관리자 설정 수정</title>
  <!-- Font Awesome & Pretendard -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
  
  <style>
/* ───────────────────────────────────────
   ROOT & RESET
─────────────────────────────────────── */
:root {
  --primary:        #ED1C24;
  --primary-light:  #FFF2F2;
  --primary-border: #FFCDD0;
  --bg:             #F4F6F9;
  --card:           #FFFFFF;
  --border:         #E2E8F0;
  --text:           #1E293B;
  --text-sub:       #64748B;
  --text-muted:     #94A3B8;
  --sidebar-w:      260px;
  --header-h:       68px;
  --radius:         12px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Pretendard', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  overflow: hidden;
}

/* ───── SIDEBAR ───── */
.sidebar {
  width: var(--sidebar-w); height: 100vh;
  background: #FFFFFF; border-right: 1px solid var(--border);
  position: fixed; left: 0; top: 0;
  display: flex; flex-direction: column;
  z-index: 100; overflow: hidden;
}
.sidebar-logo { padding: 22px 24px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sidebar-logo img { height: 28px; width: auto; display: block; }
.sidebar-profile {
  padding: 18px 24px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0; background: #FAFBFC;
}
.sp-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--primary-light); border: 2px solid var(--primary-border);
  display: flex; align-items: center; justify-content: center;
  color: var(--primary); font-size: 16px; flex-shrink: 0;
}
.sp-info { min-width: 0; }
.sp-name { font-size: 14px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sp-role {
  font-size: 11px; color: var(--primary); font-weight: 600;
  background: var(--primary-light); border: 1px solid var(--primary-border);
  border-radius: 20px; padding: 1px 8px; display: inline-block; margin-top: 3px;
}
.sidebar-menu { list-style: none; flex: 1; overflow-y: auto; padding: 8px 0; }
.sidebar-menu::-webkit-scrollbar { width: 4px; }
.sidebar-menu::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.menu-section-title {
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text-muted); padding: 16px 24px 6px;
}
.menu-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 24px; color: var(--text-sub); text-decoration: none;
  font-size: 14px; font-weight: 500; transition: all 0.15s;
  border-left: 3px solid transparent;
}
.menu-item i { width: 18px; text-align: center; font-size: 14px; color: var(--text-muted); transition: color 0.15s; flex-shrink: 0; }
.menu-item:hover { background: var(--primary-light); color: var(--primary); }
.menu-item:hover i { color: var(--primary); }
.menu-item.active { background: var(--primary-light); color: var(--primary); font-weight: 700; border-left-color: var(--primary); }
.menu-item.active i { color: var(--primary); }
.sidebar-footer { padding: 14px 24px; border-top: 1px solid var(--border); flex-shrink: 0; }
.sidebar-footer p { font-size: 11px; color: var(--text-muted); line-height: 1.6; }

/* ───── HEADER ───── */
.header {
  position: fixed; top: 0; left: var(--sidebar-w);
  width: calc(100% - var(--sidebar-w)); height: var(--header-h);
  background: #FFFFFF; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 36px; z-index: 90; gap: 16px;
}
.header-title { font-size: 18px; font-weight: 800; color: var(--text); }
.header-breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-muted); margin-left: 4px; }
.header-breadcrumb i { font-size: 10px; }
.header-breadcrumb span:last-child { color: var(--text-sub); font-weight: 500; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.header-user {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 14px 6px 8px; border-radius: 40px; border: 1px solid var(--border);
  cursor: pointer; transition: all 0.15s; font-size: 13px; font-weight: 600; color: var(--text);
}
.header-user:hover { background: var(--bg); }
.hu-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--primary-light); display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 13px; }
.hu-chevron { color: var(--text-muted); font-size: 11px; }

/* ───── MAIN ───── */
.main-content {
  margin-left: var(--sidebar-w); margin-top: var(--header-h);
  width: calc(100% - var(--sidebar-w)); height: calc(100vh - var(--header-h));
  overflow-y: auto; padding: 36px 40px;
}
.main-content::-webkit-scrollbar { width: 6px; }
.main-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ───── PAGE HEADER ───── */
.page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; }
.page-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
.page-subtitle { font-size: 14px; color: var(--text-sub); }

/* ───── UPDATE CARD & FORM ───── */
.update-card {
  background: #FFFFFF;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 36px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  max-width: 960px;
  margin-bottom: 40px;
}
.form-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px 28px;
  margin-bottom: 32px;
}
@media (max-width: 768px) {
  .form-grid {
    grid-template-columns: 1fr;
  }
  .form-group.full-width {
    grid-column: span 1 !important;
  }
}
.form-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.form-group.full-width {
  grid-column: span 2;
}
.form-group label {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-sub);
  display: flex;
  align-items: center;
  gap: 6px;
}
.form-group label i {
  color: var(--text-muted);
  font-size: 14px;
}
.form-group input, .form-group select {
  height: 44px;
  padding: 0 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  font-family: 'Pretendard', sans-serif;
  color: var(--text);
  background: #FFFFFF;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.form-group input:focus, .form-group select:focus {
  outline: none;
  border-color: var(--primary-border);
  box-shadow: 0 0 0 3px rgba(237, 28, 36, 0.08);
}
.form-group input[readonly] {
  background: #F8FAFC;
  border-color: var(--border);
  color: var(--text-sub);
  cursor: not-allowed;
}
.form-group input[readonly]:focus {
  box-shadow: none;
  border-color: var(--border);
}

/* Custom styled dropdown arrow packaging */
.select-wrapper {
  position: relative;
  display: flex;
  flex-direction: column;
}
.select-wrapper select {
  width: 100%;
  appearance: none;
  -webkit-appearance: none;
  padding-right: 40px;
}
.select-wrapper::after {
  content: '\f078';
  font-family: 'Font Awesome 6 Free';
  font-weight: 900;
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 11px;
  pointer-events: none;
}

/* ───── SUBMIT AREA ───── */
.submit-area {
  display: flex;
  justify-content: flex-end;
  border-top: 1px solid var(--border);
  padding-top: 24px;
}
.submit-area button {
  background: var(--primary);
  color: #FFFFFF;
  border: none;
  border-radius: 8px;
  padding: 12px 32px;
  font-size: 14px;
  font-weight: 700;
  font-family: 'Pretendard', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
  box-shadow: 0 4px 12px rgba(237, 28, 36, 0.2);
  display: flex;
  align-items: center;
  gap: 8px;
}
.submit-area button:hover {
  background: #D1141B;
  transform: translateY(-1px);
  box-shadow: 0 6px 16px rgba(237, 28, 36, 0.3);
}
.submit-area button:active {
  transform: translateY(0);
}

/* ───── CUSTOM MODAL ALERT ───── */
.toast-overlay {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(15, 23, 42, 0.4);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s ease;
}
.toast-overlay.show {
  opacity: 1; pointer-events: auto;
}
.toast-card {
  background: #FFFFFF;
  border-radius: var(--radius);
  box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
  padding: 32px;
  width: 90%;
  max-width: 400px;
  text-align: center;
  transform: scale(0.9);
  transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.toast-overlay.show .toast-card {
  transform: scale(1);
}
.toast-icon {
  width: 56px; height: 56px;
  background: #F0FDF4; color: #16A34A;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; margin: 0 auto 16px;
  border: 1px solid #BBF7D0;
}
.toast-title {
  font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 8px;
}
.toast-desc {
  font-size: 14px; color: var(--text-sub); margin-bottom: 24px;
}
.toast-btn {
  width: 100%;
  background: var(--primary); color: #FFFFFF;
  border: none; border-radius: 8px;
  padding: 12px 24px; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: background 0.15s;
}
.toast-btn:hover {
  background: #D1141B;
}

/* ───── SUBMIT AREA MODIFIED ───── */
.submit-area {
  display: flex;
  justify-content: flex-end;
  align-items: center; /* 버튼 높이 정렬 */
  gap: 12px;           /* 버튼 사이의 간격 */
  border-top: 1px solid var(--border);
  padding-top: 24px;
}

/* 새로 추가된 목록으로 버튼 스타일 */
.submit-area .cancel-btn {
  background: #FFFFFF;
  color: var(--text-sub);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 24px;
  font-size: 14px;
  font-weight: 600;
  font-family: 'Pretendard', sans-serif;
  text-decoration: none; /* A 태그 밑줄 제거 */
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;              /* 아이콘과 텍스트 사이 간격 */
  transition: all 0.15s;
  height: 45px;          /* 우측 저장 버튼과 높이 균형 맞춤 */
}

.submit-area .cancel-btn:hover {
  background: var(--bg);
  color: var(--text);
  border-color: var(--text-muted);
}
  </style>
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">
  <div class="sidebar-logo">
    <img th:src="@{/images/BNKlogo.png}" alt="BNK 부산은행">
  </div>
  <div class="sidebar-profile">
    <div class="sp-avatar"><i class="fa-solid fa-user-tie"></i></div>
    <div class="sp-info">
      <div class="sp-name" th:text="${admin.name} + ' 관리자'">홍길동 관리자</div>
      <span class="sp-role" th:text="${admin.adminRole}">HEAD</span>
    </div>
  </div>
  <ul class="sidebar-menu">
    <li class="menu-section-title">메인</li>
    <li><a href="/admin/headDashboard" class="menu-item"><i class="fa-solid fa-chart-pie"></i> 대시보드</a></li>
    <li><a href="/admin/adminMyPage" class="menu-item"><i class="fa-solid fa-circle-user"></i> 마이페이지</a></li>
    <li class="menu-section-title">회원/관리자</li>
    <li><a href="/admin/memberList" class="menu-item"><i class="fa-solid fa-users"></i> 회원 관리</a></li>
    <li><a href="/admin/adminList" class="menu-item active"><i class="fa-solid fa-users-gear"></i> 관리자 관리</a></li>
    <li class="menu-section-title">상품</li>
    <li><a href="/admin/productRegisterPage" class="menu-item"><i class="fa-solid fa-plus-circle"></i> 상품 등록</a></li>
    <li><a href="/admin/productListPage" class="menu-item"><i class="fa-solid fa-list"></i> 상품 조회</a></li>
    <li class="menu-section-title">검색어</li>
    <li><a href="/admin/searchManagementPage" class="menu-item"><i class="fa-solid fa-magnifying-glass-chart"></i> 검색어 관리</a></li>
  </ul>
  <div class="sidebar-footer">
    <p>2024 BNK Busan Bank</p>
    <p>IT Strategy Team</p>
  </div>
</div>

<!-- ===== HEADER ===== -->
<div class="header">
  <div class="header-title">고객 통합 관리</div>
  <div class="header-breadcrumb">
    <i class="fa-solid fa-chevron-right"></i><span>관리</span>
    <i class="fa-solid fa-chevron-right"></i><span>회원/관리자 관리</span>
    <i class="fa-solid fa-chevron-right"></i><span>관리자 정보 수정</span>
  </div>
  <div class="header-right">
    <div class="header-user">
      <div class="hu-avatar"><i class="fa-solid fa-user-tie"></i></div>
      <span th:text="'관리자 ' + ${admin.name} + ' 님'">홍길동 관리자</span>
      <i class="fa-solid fa-chevron-down hu-chevron"></i>
    </div>
  </div>
</div>

<!-- ===== MAIN CONTENT ===== -->
<div class="main-content">

  <!-- 페이지 헤더 -->
  <div class="page-header">
    <div>
      <h1 class="page-title">관리자 정보 업데이트</h1>
      <p class="page-subtitle">시스템 접근 권한 및 소속 부서 정보를 안전하고 세밀하게 수정합니다.</p>
    </div>
  </div>

  <!-- 수정 카드 폼 -->
  <div class="update-card">
    <form th:action="@{/admin/updateAdmin}" th:object="${admin}" method="post">
      <input type="hidden" th:field="*{admin_id}">
      
      <div class="form-grid">
        <div class="form-group">
          <label><i class="fa-solid fa-lock"></i> 로그인 비밀번호</label>
          <input type="password" th:field="*{password}" placeholder="비밀번호 변경 시에만 입력">
        </div>

        <div class="form-group">
          <label><i class="fa-solid fa-building-user"></i> 소속 부서</label>
          <div class="select-wrapper">
            <select th:field="*{department}">
              <option value="상품">상품운영팀</option>
              <option value="외환">외환지원팀</option>
              <option value="전체">IT전략본부 (전체)</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label><i class="fa-solid fa-key"></i> 관리자 인증 암호 (Admin PW)</label>
          <input type="password" th:field="*{admin_pw}" placeholder="관리자 확인용 비밀암호">
        </div>

        <div class="form-group">
          <label><i class="fa-solid fa-signature"></i> 관리자 실명</label>
          <input type="text" th:field="*{name}">
        </div>

        <div class="form-group full-width">
          <label><i class="fa-solid fa-shield-halved"></i> 부여된 직위 (Admin Role)</label>
          <div class="select-wrapper">
            <select th:field="*{admin_role}">
              <option value="chief">Chief (최고 관리자)</option>
              <option value="head">Head (책임 관리자)</option>
              <option value="executive">Executive (실무 관리자)</option>
            </select>
          </div>
        </div>
      </div>

      <div class="submit-area">
      <a th:href="@{/admin/adminList}" class="cancel-btn">
          <i class="fa-solid fa-arrow-left"></i> 목록으로
        </a>
        <button type="submit">
          <i class="fa-solid fa-floppy-disk"></i> 시스템 설정 저장
        </button>
      </div>
    </form>
  </div>
</div>

<!-- ===== CUSTOM ALERT DIALOG ===== -->
<div id="alertOverlay" class="toast-overlay">
  <div class="toast-card">
    <div class="toast-icon"><i class="fa-solid fa-circle-check"></i></div>
    <h3 class="toast-title">수정 완료</h3>
    <p class="toast-desc">관리자 설정 변경이 성공적으로 완료되었습니다.</p>
    <button class="toast-btn" onclick="closeAlert()">확인</button>
  </div>
</div>

<script th:inline="javascript">
  function closeAlert() {
    document.getElementById('alertOverlay').classList.remove('show');
  }

  window.onload = function() {
    var resultMessage = [[${result}]];
    if (resultMessage != null) {
      document.getElementById('alertOverlay').classList.add('show');
    }
  };
</script>
</body>
</html>
