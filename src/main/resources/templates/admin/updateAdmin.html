<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>BNK Busan Bank - 관리자 설정 수정</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" th:href="@{/css/admin/updateAdmin.css}">

</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">
            <img src="https://sites.bnk.co.kr/main/resource/img/common/logo_busan.png" alt="BNK">
        </div>
        <ul class="sidebar-menu">
            <li><a href="#" class="menu-item"><i class="fa-solid fa-chart-line"></i> 대시보드</a></li>
            <li><a href="#" class="menu-item active"><i class="fa-solid fa-users-gear"></i> 관리자 계정 수정</a></li>
            <li><a href="#" class="menu-item"><i class="fa-solid fa-file-signature"></i> 상품 승인 심사</a></li>
        </ul>
    </div>

    <div class="header">
        <div class="header-title">시스템 보안 및 계정 관리</div>
    </div>

    <div class="main-content">
        <div class="content-header">
            <h1 class="content-title">관리자 정보 업데이트</h1>
            <p style="color: var(--text-label); font-size: 14px; margin-top: 5px;">시스템 접근 권한 및 소속 부서 정보를 수정합니다.</p>
        </div>

        <div class="update-card">
            <form th:action="@{/admin/updateAdmin}" th:object="${admin}" method="post">
                <input type="hidden" th:field="*{admin_id}">
                
                <div class="form-grid">
                    <div class="form-group">
                        <label>로그인 비밀번호</label>
                        <input type="password" th:field="*{password}" placeholder="비밀번호 변경 시 입력">
                    </div>

                    <div class="form-group">
                        <label>소속 부서</label>
                        <select th:field="*{department}">
                            <option value="상품">상품운영팀</option>
                            <option value="외환">외환지원팀</option>
                            <option value="전체">IT전략본부 (전체)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>관리자 인증 암호 (Admin PW)</label>
                        <input type="password" th:field="*{admin_pw}" placeholder="관리자 전용 암호">
                    </div>

                    <div class="form-group">
                        <label>관리자 실명</label>
                        <input type="text" th:field="*{name}">
                    </div>

                    <div class="form-group full-width">
                        <label>부여된 직위 (Admin Role)</label>
                        <select th:field="*{admin_role}">
                            <option value="chief">Chief (최고 관리자)</option>
                            <option value="head">Head (책임 관리자)</option>
                            <option value="executive">Executive (실무 관리자)</option>
                        </select>
                    </div>
                </div>

                <div class="submit-area">
                    <button type="submit">시스템 설정 저장</button>
                </div>
            </form>
        </div>
    </div>

    <script th:inline="javascript">
        if([[${result}]] != null) {
            alert("수정이 완료되었습니다.");
        }
    </script>
</body>
</html>
