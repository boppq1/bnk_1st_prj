<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>관리자 로그인</title>
</head>

<body>

<div class="login-box">

    <h2>관리자 로그인</h2>

    <script th:if="${param.error}">
        alert("아이디 또는 비밀번호를 다시 확인해 주세요!!!");
    </script>

    <!-- 로그인 폼 -->
    <form th:action="@{/admin/login}" method="post">

        <label for="login_id">아이디</label>
        <input type="text"
               id="login_id"
               name="login_id"
               placeholder="아이디 입력"
               required>

        <label for="password">비밀번호</label>
        <input type="password"
               id="password"
               name="password"
               placeholder="비밀번호 입력"
               required>

        <button type="submit">로그인</button>

    </form>
</body>
</html>
