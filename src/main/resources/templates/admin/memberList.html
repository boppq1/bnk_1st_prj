<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<h1>멤버 리스트 페이지</h1>
	<hr>
	<table border=1>
		<thead>
			<tr>
				<td>아이디</td>
				<td>비밀번호</td>
				<td>이름</td>
				<td>핸드폰번호</td>
				<td>생일</td>
				<td>이메일</td>
				<td>성별</td>
				<td>영문명</td>
				<td>우편번호</td>
				<td>주소</td>
				<td>세부주소</td>
			</tr>
		</thead>
		
		<tbody>
			<tr th:each="user : ${userList}">
				<td th:text="${user.login_id}"></td>
				<td th:text="${user.password}"></td>
				<td th:text="${user.name}"></td>
				<td th:text="${user.phone}"></td>
				<td th:text="${user.birth}"></td>
				<td th:text="${user.email}"></td>
				<td th:text="${user.gender}"></td>
				<td th:text="${user.e_name}"></td>
				<td th:text="${user.postal_code}"></td>
				<td th:text="${user.address}"></td>
				<td th:text="${user.address_detail}"></td>
			</tr>
		</tbody>
	</table>
</body>
</html>
