<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title></title>

<link rel="stylesheet" th:href="@{/css/header.css}">
<link rel="stylesheet" th:href="@{/css/footer.css}">
<link rel="stylesheet" th:href="@{/css/search/search.css}">
<link rel="stylesheet" th:href="@{/css/product/product.css}">
<link rel="stylesheet" th:href="@{/css/fx/viewRate.css}">
<link rel="stylesheet" th:href="@{/css/foreign/studyAbroad.css}">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

	<div th:replace="~{header :: header}"></div>

	<div class="product-layout">

		<div th:replace="~{fragments/foreignSidebar :: foreignSidebar}"></div>

		<div class="main_container">

			<div class="left_side">

				<!-- 조회 영역 타이틀 (기존 ::before 대체) -->
				<div class="form_title">환율 조회</div>

				<div class="select_form">
					<select id="cur_nm" name="cur_nm">
						<option value="USD">미국 달러</option>
						<option value="JPY(100)">일본 엔</option>
						<option value="CNH">중국 위안화</option>
						<option value="EUR">유로</option>
						<option value="HKD">홍콩 달러</option>
						<option value="SGD">싱가포르 달러</option>
						<option value="THB">태국 바트</option>
						<option value="AUD">호주 달러</option>
						<option value="GBP">영국 파운드</option>
						<option value="CAD">캐나다 달러</option>
						<option value="MYR">말레이시아 링기트</option>
						<option value="AED">아랍에미리트 디르함</option>
						<option value="BHD">바레인 디나르</option>
						<option value="CHF">스위스 프랑</option>
						<option value="DKK">덴마크 크로네</option>
						<option value="IDR(100)">인도네시아 루피아</option>
						<option value="KWD">쿠웨이트 디나르</option>
						<option value="NOK">노르웨이 크로네</option>
						<option value="NZD">뉴질랜드 달러</option>
						<option value="SAR">사우디 리얄</option>
						<option value="SEK">스웨덴 크로나</option>
					</select>

					<button type="button" id="searchBtn">조회</button>
				</div>

			</div>

			<!-- 결과 영역 -->
			<div class="view_rate_table">

				<!-- 결과 헤더 추가 -->
				<div class="table_header">
					환율 조회 결과 <span class="sub_text">최근 기준</span>
				</div>

				<table border="1">
					<thead>
						<tr>
							<th>고지 시간</th>
							<th>환율코드</th>
							<th>통화이름</th>
							<th>통화 살 때</th>
							<th>통화 팔 때</th>
							<th>기준 환율</th>
						</tr>
					</thead>

					<tbody id="rateTableBody"></tbody>
				</table>

			</div>

		</div>
	</div>

	<div th:replace="~{footer :: footer}"></div>

	<script src="/js/fx/viewRate.js"></script>
	<script th:src="@{/js/product/foreign.js}"></script>
	<script th:src="@{/js/zoom.js}"></script>

</body>
</html>
